services:
  vectora:
    build: .
    ports:
      - "8080:8080"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - VECTORA_SECRET_KEY=${VECTORA_SECRET_KEY:-super-secret-key-123}
    volumes:
      - vectora_data:/root/.Vectora
    restart: unless-stopped

volumes:
  vectora_data:
