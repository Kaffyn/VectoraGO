apiVersion: apps/v1
kind: Deployment
metadata:
  name: vectora-core
  namespace: default
  labels:
    app: vectora
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vectora
  template:
    metadata:
      labels:
        app: vectora
    spec:
      containers:
      - name: vectora-node
        image: kaffyn/vectora:latest
        ports:
        - containerPort: 8080
        env:
        - name: VECTORA_MODE
          value: "service"
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: vectora-secrets
              key: gemini-api-key
        - name: VECTORA_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: vectora-secrets
              key: secret-key
        volumeMounts:
        - name: vectora-data
          mountPath: /root/.config/vectora
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
      volumes:
      - name: vectora-data
        emptyDir: {} # Em produção use PersistentVolumeClaim
---
apiVersion: v1
kind: Service
metadata:
  name: vectora-service
spec:
  selector:
    app: vectora
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
