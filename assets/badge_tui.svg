<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="emeraldGradientClean" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Base Rect -->
  <rect width="256" height="256" rx="48" fill="#1E293B" stroke="#F1F5F9" stroke-width="12"/>

  <!-- Terminal Screen (Emerald #10B981) -->
  <rect x="40" y="50" width="176" height="160" rx="12" stroke="#10B981" stroke-width="14" fill="#0F172A"/>

  <!-- Terminal Top Bar (Darker) -->
  <rect x="40" y="50" width="176" height="32" rx="12" fill="#10B981" opacity="0.2"/>

  <!-- Prompt Symbol (Emerald Gradient) -->
  <text x="60" y="140" font-family="monospace" font-size="32" font-weight="bold" fill="url(#emeraldGradientClean)">&gt;</text>

  <!-- Command Lines (Emerald Gradient) -->
  <rect x="100" y="130" width="80" height="12" rx="2" fill="url(#emeraldGradientClean)"/>
  <rect x="60" y="160" width="120" height="12" rx="2" fill="url(#emeraldGradientClean)"/>
  <rect x="60" y="185" width="100" height="12" rx="2" fill="url(#emeraldGradientClean)"/>
</svg>
