<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Core Branding (Purple #4F46E5 background + White V + Cyan dot) -->
  <rect width="256" height="256" rx="48" fill="#4F46E5"/>
  <path d="M 60 70 L 128 190 L 196 70" stroke="#FFFFFF" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="128" cy="190" r="16" fill="#0EA5E9"/>

  <!-- Updated Minimalist Badge App overlay (Bottom Right Corner) -->
  <g transform="translate(140, 140) scale(0.4)">
    <defs>
      <linearGradient id="yellowGradientCleanMini" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
      </linearGradient>
    </defs>
    <rect width="256" height="256" rx="48" fill="#1E293B" stroke="#F1F5F9" stroke-width="20"/>

    <!-- Monitor Structure (Blue #3B82F6) No Title Bar -->
    <path d="M 100 210 L 156 210" stroke="#3B82F6" stroke-width="14" stroke-linecap="round"/>
    <path d="M 128 193 L 128 210" stroke="#3B82F6" stroke-width="14" stroke-linecap="round"/>
    <rect x="50" y="56" width="156" height="136" rx="12" stroke="#3B82F6" stroke-width="24" fill="#0F172A"/>

    <!-- Website Content Blocks (Yellow #F59E0B) -->
    <rect x="70" y="80" width="30" height="88" rx="4" fill="url(#yellowGradientCleanMini)"/>
    <rect x="110" y="80" width="76" height="24" rx="4" fill="url(#yellowGradientCleanMini)"/>
    <rect x="110" y="114" width="76" height="24" rx="4" fill="url(#yellowGradientCleanMini)"/>
    <rect x="110" y="148" width="76" height="20" rx="4" fill="url(#yellowGradientCleanMini)"/>
  </g>
</svg>
