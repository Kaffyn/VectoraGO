name: Build Cross-Platform

on:
  workflow_call:   # Chamado apenas pelo ci.yml
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            arch: amd64
            runner: windows-latest
            suffix: .exe
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            suffix: ""
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            suffix: ""
          - os: darwin
            arch: amd64
            runner: macos-latest
            suffix: ""
          - os: darwin
            arch: arm64
            runner: macos-latest
            suffix: ""
          - os: linux # Kubernetes specialized build (Linux AMD64)
            arch: amd64
            runner: ubuntu-latest
            suffix: "-k8s"
            is_k8s: true

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Criar diretório bin
        run: mkdir -p bin

      - name: Install CGO dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-x86-64-linux-gnu build-essential

      - name: Build vectora via build.ps1
        shell: pwsh
        run: ./build.ps1
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          BUILD_SUFFIX: ${{ matrix.suffix }}
          BUILD_TARGET: ${{ matrix.is_k8s && 'k8s' || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vectora-${{ matrix.os }}-${{ matrix.arch }}
          path: bin/
          retention-days: 7
