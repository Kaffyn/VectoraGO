name: Build Cross-Platform

on:
  workflow_call:   # Chamado apenas pelo ci.yml
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            arch: amd64
            runner: windows-latest
            suffix: .exe
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            suffix: ""
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            suffix: ""
          - os: darwin
            arch: amd64
            runner: macos-latest
            suffix: ""
          - os: darwin
            arch: arm64
            runner: macos-latest
            suffix: ""

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Criar diretório bin
        run: mkdir -p bin

      - name: Build vectora (core)
        run: go build -v -ldflags="-s -w" -o bin/vectora-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.suffix }} ./cmd/core
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vectora-${{ matrix.os }}-${{ matrix.arch }}
          path: bin/
          retention-days: 7
