name: Release VS Code Extension

on:
  workflow_call:   # Chamado apenas pelo ci.yml
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build & Publish VS Code Extension
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extensions/vscode/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: extensions/vscode

      - name: Compile extension
        run: npm run compile
        working-directory: extensions/vscode

      - name: Package VSIX
        run: npx vsce package
        working-directory: extensions/vscode

      - name: Get VSIX file path
        id: vsix
        run: |
          VSIX_FILE=$(ls *.vsix)
          echo "file=$VSIX_FILE" >> $GITHUB_OUTPUT
        working-directory: extensions/vscode

      - name: Upload VSIX to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: extensions/vscode/${{ steps.vsix.outputs.file }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/v')
        run: npx vsce publish -p ${{ secrets.VSCE_PAT }}
        working-directory: extensions/vscode
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
