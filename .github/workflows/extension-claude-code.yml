name: Extension — Claude Code

on:
  workflow_call:   # Chamado apenas pelo ci.yml
  workflow_dispatch:

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extensions/claude-code/package-lock.json

      - name: Install dependencies (sem postinstall)
        working-directory: extensions/claude-code
        run: npm install --ignore-scripts

      - name: Type check
        working-directory: extensions/claude-code
        run: npm run compile

      - name: Build bundle
        working-directory: extensions/claude-code
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: extension-claude-code-dist
          path: extensions/claude-code/dist/
          retention-days: 7

  package-vsix:
    name: Package VSIX
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/ext-claude-code-v') || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: extensions/claude-code/package-lock.json

      - name: Install dependencies (sem postinstall)
        working-directory: extensions/claude-code
        run: npm install --ignore-scripts

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Build + package VSIX
        working-directory: extensions/claude-code
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vectora-claude-code.vsix
          path: extensions/claude-code/*.vsix
          retention-days: 30

  publish:
    name: Publish npm + VSIX
    runs-on: ubuntu-latest
    needs: package-vsix
    if: startsWith(github.ref, 'refs/tags/ext-claude-code-v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: extensions/claude-code/package-lock.json

      - name: Install dependencies (sem postinstall)
        working-directory: extensions/claude-code
        run: npm install --ignore-scripts

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Build
        working-directory: extensions/claude-code
        run: npm run build

      - name: Publish to npm
        working-directory: extensions/claude-code
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Package VSIX
        working-directory: extensions/claude-code
        run: vsce package

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/ext-claude-code-}" >> $GITHUB_OUTPUT

      - name: Upload VSIX to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "Vectora Claude Code Extension ${{ steps.version.outputs.version }}"
          body: |
            ## Vectora Claude Code Extension ${{ steps.version.outputs.version }}

            ### Instalação rápida
            ```bash
            npm install -g vectora-claude-code
            ```
            O binário `vectora` é baixado automaticamente para o seu SO.

            **VS Code:** instale o `.vsix` abaixo ou busque "Vectora AI" no marketplace.
          files: extensions/claude-code/*.vsix
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
