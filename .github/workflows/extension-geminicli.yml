name: Release Gemini CLI Extension

on:
  workflow_call:   # Chamado apenas pelo ci.yml
  workflow_dispatch:

jobs:
  build-and-publish:
    name: Build & Publish Gemini CLI Extension
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: extensions/geminicli/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: extensions/geminicli

      - name: Build extension
        run: npm run build
        working-directory: extensions/geminicli

      - name: Publish to NPM
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --access public
        working-directory: extensions/geminicli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
