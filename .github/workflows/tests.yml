name: Command & Integration Tests

on:
  workflow_call:
    inputs:
      full_test:
        description: "Run full test suite (including slow tests)"
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      full_test:
        description: "Run full test suite (including slow tests)"
        required: false
        default: "false"

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  GO_VERSION: "1.22"
  NODE_VERSION: "20"
  RUST_BACKTRACE: 1

jobs:
  # ============================================================================
  # STAGE 1: COMMAND TESTS - Test vectora CLI commands
  # ============================================================================
  command-tests:
    name: Test Vectora Commands
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.22", "1.23"]
        node-version: ["20", "22"]
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      - name: Build Vectora CLI
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            powershell -File build-quick.ps1
          else
            go build -v -o bin/vectora ./cmd/core
          fi
        shell: bash

      - name: Verify Vectora binary
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./bin/vectora.exe --version
          else
            ./bin/vectora --version
          fi
        shell: bash

      - name: Run help command
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            ./bin/vectora.exe --help
          else
            ./bin/vectora --help
          fi
        shell: bash

      - name: Test command availability
        run: bash scripts/verify-help.sh
        shell: bash
        continue-on-error: true

      - name: Create test environment
        run: bash scripts/setup-test-env.sh
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Run command suite tests
        run: bash scripts/run-command-suite.sh
        shell: bash
        continue-on-error: true
        timeout-minutes: 10
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}


  # ============================================================================
  # STAGE 2: EXTENSION TESTS - Test VS Code extension
  # ============================================================================
  extension-tests:
    name: Test VS Code Extension
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "extensions/vscode/package-lock.json"

      - name: Install dependencies
        working-directory: extensions/vscode
        run: npm ci

      - name: Lint TypeScript
        working-directory: extensions/vscode
        run: npm run lint
        continue-on-error: true

      - name: Type check
        working-directory: extensions/vscode
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Run unit tests
        working-directory: extensions/vscode
        run: npm test -- --coverage --watchAll=false
        continue-on-error: true

      - name: Build extension
        working-directory: extensions/vscode
        run: npm run compile


  # ============================================================================
  # STAGE 3: CLI EXTENSION TESTS - Test Gemini CLI
  # ============================================================================
  cli-extension-tests:
    name: Test Gemini CLI Extension
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "extensions/geminicli/package-lock.json"

      - name: Install dependencies
        working-directory: extensions/geminicli
        run: npm ci

      - name: Build extension
        working-directory: extensions/geminicli
        run: npm run build

      - name: Verify build output
        working-directory: extensions/geminicli
        run: |
          if [ ! -d "dist" ]; then
            echo "Build failed: dist directory not created"
            exit 1
          fi

  # ============================================================================
  # STAGE 4: INTEGRATION TESTS - Test core integration
  # ============================================================================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run integration tests
        run: go test -v -race -tags=integration ./... || true
        timeout-minutes: 15

      - name: Generate coverage report
        run: |
          go test -coverprofile=coverage.out -covermode=atomic ./... || true
          go tool cover -html=coverage.out -o coverage.html || true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: integration
          name: codecov-integration
        continue-on-error: true

  # ============================================================================
  # STAGE 5: TEST SUMMARY
  # ============================================================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [command-tests, extension-tests, cli-extension-tests, integration-tests]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Check test results
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║                  Test Execution Summary                    ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "📊 Test Results:"
          echo "  Command Tests:      ${{ needs.command-tests.result }}"
          echo "  Extension Tests:    ${{ needs.extension-tests.result }}"
          echo "  CLI Ext Tests:      ${{ needs.cli-extension-tests.result }}"
          echo "  Integration Tests:  ${{ needs.integration-tests.result }}"
          echo ""

      - name: Tests failed
        if: failure()
        run: |
          echo "❌ Some tests failed!"
          exit 1

      - name: Tests passed
        if: success()
        run: |
          echo "✅ All tests passed!"
