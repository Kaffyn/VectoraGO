name: CI Pipeline

on:
  push:
    branches: ["**"]
    tags:
      - "v*"
      - "ext-claude-code-v*"
  pull_request:
    branches: [master, develop]
  workflow_dispatch:
    inputs:
      full_test:
        description: "Run full test suite (including slow tests)"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write
  checks: write
  pull-requests: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      core:           ${{ steps.changes.outputs.core }}
      ext_vscode:     ${{ steps.changes.outputs.ext_vscode }}
      ext_geminicli:  ${{ steps.changes.outputs.ext_geminicli }}
      ext_claudecode: ${{ steps.changes.outputs.ext_claudecode }}
      is_release:     ${{ steps.changes.outputs.is_release }}
      is_ext_release: ${{ steps.changes.outputs.is_ext_release }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Detect changed files
        id: changes
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

          if [[ "${{ github.ref }}" =~ ^refs/tags/ext-claude-code-v ]]; then
            echo "is_ext_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_ext_release=false" >> $GITHUB_OUTPUT
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE=${{ github.event.pull_request.base.sha }}
            HEAD=${{ github.event.pull_request.head.sha }}
          else
            BASE=${{ github.event.before }}
            HEAD=${{ github.sha }}
          fi

          changed=$(git diff --name-only $BASE $HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD)

          check() { echo "$changed" | grep -qE "$1" && echo "true" || echo "false"; }

          echo "core=$(check           '^(cmd|core|internal)/|^go\.(mod|sum)$|^\.github/workflows/')" >> $GITHUB_OUTPUT
          echo "ext_vscode=$(check     '^extensions/vscode/')"                   >> $GITHUB_OUTPUT
          echo "ext_geminicli=$(check  '^extensions/geminicli/')"                >> $GITHUB_OUTPUT
          echo "ext_claudecode=$(check '^extensions/claude-code/')"              >> $GITHUB_OUTPUT

      - name: Detection summary
        run: |
          echo "### Changed components" >> $GITHUB_STEP_SUMMARY
          echo "| Component        | Changed |" >> $GITHUB_STEP_SUMMARY
          echo "|------------------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Core (Go)        | ${{ steps.changes.outputs.core }} |"           >> $GITHUB_STEP_SUMMARY
          echo "| Ext. VS Code     | ${{ steps.changes.outputs.ext_vscode }} |"     >> $GITHUB_STEP_SUMMARY
          echo "| Ext. Gemini CLI  | ${{ steps.changes.outputs.ext_geminicli }} |"  >> $GITHUB_STEP_SUMMARY
          echo "| Ext. Claude Code | ${{ steps.changes.outputs.ext_claudecode }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Core Release     | ${{ steps.changes.outputs.is_release }} |"    >> $GITHUB_STEP_SUMMARY
          echo "| Ext CC Release   | ${{ steps.changes.outputs.is_ext_release }} |" >> $GITHUB_STEP_SUMMARY

  tests:
    name: Core Tests
    needs: detect
    if: |
      needs.detect.outputs.core == 'true' ||
      needs.detect.outputs.is_release == 'true' ||
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/master' ||
      github.ref == 'refs/heads/mvp'
    uses: ./.github/workflows/tests.yml
    with:
      full_test: ${{ github.event.inputs.full_test == 'true' }}

  build:
    name: Core Build
    needs: [detect, tests]
    if: |
      (needs.detect.outputs.core == 'true' ||
       github.event_name == 'workflow_dispatch' ||
       github.ref == 'refs/heads/master' ||
       github.ref == 'refs/heads/mvp') &&
      !startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/build.yml

  security:
    name: Security
    needs: detect
    if: |
      needs.detect.outputs.core == 'true' ||
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/master' ||
      github.ref == 'refs/heads/mvp'
    uses: ./.github/workflows/security.yml

  ext-vscode:
    name: VS Code Extension
    uses: ./.github/workflows/extension-vscode.yml

  ext-geminicli:
    name: Gemini CLI Extension
    uses: ./.github/workflows/extension-geminicli.yml

  ext-claudecode:
    name: Claude Code Extension
    needs: detect
    if: needs.detect.outputs.is_ext_release == 'true' || github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    uses: ./.github/workflows/extension-claude-code.yml

  release:
    name: Release
    needs: [detect, tests]
    if: needs.detect.outputs.is_release == 'true'
    uses: ./.github/workflows/release.yml

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [detect, tests, build, security, ext-vscode, ext-geminicli, ext-claudecode, release]
    if: always()
    steps:
      - name: Results
        run: |
          echo "### Pipeline results" >> $GITHUB_STEP_SUMMARY
          echo "| Job              | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tests            | ${{ needs.tests.result }} |"          >> $GITHUB_STEP_SUMMARY
          echo "| Build            | ${{ needs.build.result }} |"          >> $GITHUB_STEP_SUMMARY
          echo "| Security         | ${{ needs.security.result }} |"       >> $GITHUB_STEP_SUMMARY
          echo "| Ext. VS Code     | ${{ needs.ext-vscode.result }} |"     >> $GITHUB_STEP_SUMMARY
          echo "| Ext. Gemini CLI  | ${{ needs.ext-geminicli.result }} |"  >> $GITHUB_STEP_SUMMARY
          echo "| Ext. Claude Code | ${{ needs.ext-claudecode.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Release          | ${{ needs.release.result }} |"        >> $GITHUB_STEP_SUMMARY
